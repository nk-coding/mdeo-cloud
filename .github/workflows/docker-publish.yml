name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build ${{ matrix.service.name }} (linux/amd64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: infra/docker/backend/Dockerfile
          - name: workbench
            dockerfile: infra/docker/workbench/Dockerfile
          - name: service-metamodel
            dockerfile: infra/docker/service-metamodel/Dockerfile
            version_arg: true
          - name: service-model
            dockerfile: infra/docker/service-model/Dockerfile
            version_arg: true
          - name: service-script
            dockerfile: infra/docker/service-script/Dockerfile
            version_arg: true
          - name: service-model-transformation
            dockerfile: infra/docker/service-model-transformation/Dockerfile
            version_arg: true
          - name: service-config
            dockerfile: infra/docker/service-config/Dockerfile
            version_arg: true
          - name: service-config-optimization
            dockerfile: infra/docker/service-config-optimization/Dockerfile
            version_arg: true
          - name: service-config-mdeo
            dockerfile: infra/docker/service-config-mdeo/Dockerfile
            version_arg: true
          - name: script-execution
            dockerfile: infra/docker/script-execution/Dockerfile
          - name: model-transformation-execution
            dockerfile: infra/docker/model-transformation-execution/Dockerfile
          - name: optimizer-execution
            dockerfile: infra/docker/optimizer-execution/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build (no push)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-amd64

      - name: Set SERVICE_VERSION build arg
        if: startsWith(github.ref, 'refs/tags/v')
        id: buildargs
        run: |
          if [[ "${{ matrix.service.version_arg }}" == "true" ]]; then
            echo "value=SERVICE_VERSION=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push by digest
        if: startsWith(github.ref, 'refs/tags/v')
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: ${{ steps.buildargs.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-amd64

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.service.name }}-linux-amd64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    name: Build ${{ matrix.service.name }} (linux/arm64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: infra/docker/backend/Dockerfile
          - name: workbench
            dockerfile: infra/docker/workbench/Dockerfile
          - name: service-metamodel
            dockerfile: infra/docker/service-metamodel/Dockerfile
            version_arg: true
          - name: service-model
            dockerfile: infra/docker/service-model/Dockerfile
            version_arg: true
          - name: service-script
            dockerfile: infra/docker/service-script/Dockerfile
            version_arg: true
          - name: service-model-transformation
            dockerfile: infra/docker/service-model-transformation/Dockerfile
            version_arg: true
          - name: service-config
            dockerfile: infra/docker/service-config/Dockerfile
            version_arg: true
          - name: service-config-optimization
            dockerfile: infra/docker/service-config-optimization/Dockerfile
            version_arg: true
          - name: service-config-mdeo
            dockerfile: infra/docker/service-config-mdeo/Dockerfile
            version_arg: true
          - name: script-execution
            dockerfile: infra/docker/script-execution/Dockerfile
          - name: model-transformation-execution
            dockerfile: infra/docker/model-transformation-execution/Dockerfile
          - name: optimizer-execution
            dockerfile: infra/docker/optimizer-execution/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}

      - name: Set SERVICE_VERSION build arg
        id: buildargs
        run: |
          if [[ "${{ matrix.service.version_arg }}" == "true" ]]; then
            echo "value=SERVICE_VERSION=${{ steps.meta.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=" >> $GITHUB_OUTPUT
          fi

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: ${{ steps.buildargs.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-arm64

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.service.name }}-linux-arm64
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.service.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
          - name: workbench
          - name: service-metamodel
          - name: service-model
          - name: service-script
          - name: service-model-transformation
          - name: service-config
          - name: service-config-optimization
          - name: service-config-mdeo
          - name: script-execution
          - name: model-transformation-execution
          - name: optimizer-execution

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.service.name }}-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/mdeo-${{ matrix.service.name }}:${{ steps.meta.outputs.version }}
