services:
  postgres-backend:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mdeo
      POSTGRES_PASSWORD: mdeo
      POSTGRES_DB: mdeo
    ports:
      - "5432:5432"
    volumes:
      - postgres-backend-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdeo -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-script:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mdeo
      POSTGRES_PASSWORD: mdeo
      POSTGRES_DB: mdeo
    ports:
      - "5433:5432"
    volumes:
      - postgres-script-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdeo -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres-backend:5432/mdeo
      DATABASE_USER: mdeo
      DATABASE_PASSWORD: mdeo
      SESSION_MAX_IDLE_SECONDS: 604800
      SESSION_MAX_ABSOLUTE_SECONDS: 15552000
      CSRF_ROTATION_SECONDS: 3600
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "Lax"
      CORS_ALLOWED_HOSTS: localhost:4242,localhost:5173,127.0.0.1:4242,127.0.0.1:5173
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      PLUGIN_BASE_URL: ""
      INTERNAL_PLUGIN_BASE_URL: "http://workbench:80"
      DEFAULT_PLUGIN_URLS: "/plugin/metamodel,/plugin/model,/plugin/script,/plugin/model-transformation"
    depends_on:
      postgres-backend:
        condition: service_healthy
      workbench:
        condition: service_started
    restart: unless-stopped

  workbench:
    build:
      context: ..
      dockerfile: infra/docker/workbench/Dockerfile
    environment:
      PLUGIN_METAMODEL_SERVICE: http://service-metamodel:3000
      PLUGIN_MODEL_SERVICE: http://service-model:3000
      PLUGIN_SCRIPT_SERVICE: http://service-script:3000
      PLUGIN_MODEL_TRANSFORMATION_SERVICE: http://service-model-transformation:3000
      BACKEND_SERVICE: http://backend:8080
    ports:
      - "4242:80"
    depends_on:
      service-metamodel:
        condition: service_healthy
      service-model:
        condition: service_healthy
      service-script:
        condition: service_healthy
      service-model-transformation:
        condition: service_healthy
    restart: unless-stopped

  service-metamodel:
    build:
      context: ..
      dockerfile: infra/docker/service-metamodel/Dockerfile
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080/api"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-model:
    build:
      context: ..
      dockerfile: infra/docker/service-model/Dockerfile
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080/api"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-script:
    build:
      context: ..
      dockerfile: infra/docker/service-script/Dockerfile
    ports:
      - "3003:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080/api"
      SCRIPT_EXECUTION_SERVICE_URL: "http://script-execution:8081"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-model-transformation:
    build:
      context: ..
      dockerfile: infra/docker/service-model-transformation/Dockerfile
    ports:
      - "3004:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080/api"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  script-execution:
    build:
      context: ..
      dockerfile: infra/docker/script-execution/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"
      DATABASE_URL: "jdbc:postgresql://postgres-script:5432/mdeo"
      DATABASE_USER: "mdeo"
      DATABASE_PASSWORD: "mdeo"
      BACKEND_API_URL: "http://backend:8080/api"
      EXECUTION_TIMEOUT_MS: "300000"
    depends_on:
      postgres-script:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-backend-data:
  postgres-script-data:
