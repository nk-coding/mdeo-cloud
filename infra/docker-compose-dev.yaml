services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mdeo
      POSTGRES_PASSWORD: mdeo
      POSTGRES_DB: mdeo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdeo -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mdeo
      DATABASE_USER: mdeo
      DATABASE_PASSWORD: mdeo
      SESSION_MAX_IDLE_SECONDS: 604800
      SESSION_MAX_ABSOLUTE_SECONDS: 15552000
      CSRF_ROTATION_SECONDS: 3600
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: "Lax"
      CORS_ALLOWED_HOSTS: localhost:4242,localhost:5173,127.0.0.1:4242,127.0.0.1:5173
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      PLUGIN_BASE_URL: "workbench:80"
      DEFAULT_PLUGIN_URLS: "http://service-metamodel:3000,http://service-model:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  workbench:
    build:
      context: ..
      dockerfile: infra/docker/workbench/Dockerfile
    environment:
      PLUGIN_METAMODEL_SERVICE: http://service-metamodel:3000
      PLUGIN_MODEL_SERVICE: http://service-model:3000
      BACKEND_SERVICE: http://backend:8080
    ports:
      - "4242:80"
    depends_on:
      backend:
        condition: service_started
      service-metamodel:
        condition: service_healthy
      service-model:
        condition: service_healthy
    restart: unless-stopped

  service-metamodel:
    build:
      context: ..
      dockerfile: infra/docker/service-metamodel/Dockerfile
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend
    restart: unless-stopped

  service-model:
    build:
      context: ..
      dockerfile: infra/docker/service-model/Dockerfile
    ports:
      - "3002:3000"
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
