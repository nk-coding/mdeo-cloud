services:
  postgres-backend:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${BACKEND_DB_USER:-${DATABASE_USER}}
      POSTGRES_PASSWORD: ${BACKEND_DB_PASSWORD:-${DATABASE_PASSWORD}}
      POSTGRES_DB: mdeo
    volumes:
      - postgres-backend-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BACKEND_DB_USER:-${DATABASE_USER}} -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-script:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${SCRIPT_DB_USER:-${DATABASE_USER}}
      POSTGRES_PASSWORD: ${SCRIPT_DB_PASSWORD:-${DATABASE_PASSWORD}}
      POSTGRES_DB: mdeo
    volumes:
      - postgres-script-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCRIPT_DB_USER:-${DATABASE_USER}} -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  postgres-model-transformation:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${MODEL_TRANSFORMATION_DB_USER:-${DATABASE_USER}}
      POSTGRES_PASSWORD: ${MODEL_TRANSFORMATION_DB_PASSWORD:-${DATABASE_PASSWORD}}
      POSTGRES_DB: mdeo
    volumes:
      - postgres-model-transformation-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MODEL_TRANSFORMATION_DB_USER:-${DATABASE_USER}} -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-optimizer:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${OPTIMIZER_DB_USER:-${DATABASE_USER}}
      POSTGRES_PASSWORD: ${OPTIMIZER_DB_PASSWORD:-${DATABASE_PASSWORD}}
      POSTGRES_DB: mdeo
    volumes:
      - postgres-optimizer-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OPTIMIZER_DB_USER:-${DATABASE_USER}} -d mdeo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_USER: ${BACKEND_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${BACKEND_DB_PASSWORD:-${DATABASE_PASSWORD}}
      SESSION_MAX_IDLE_SECONDS: ${SESSION_MAX_IDLE_SECONDS}
      SESSION_MAX_ABSOLUTE_SECONDS: ${SESSION_MAX_ABSOLUTE_SECONDS}
      CSRF_ROTATION_SECONDS: ${CSRF_ROTATION_SECONDS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      CORS_ALLOWED_HOSTS: ${CORS_ALLOWED_HOSTS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PLUGIN_BASE_URL: ${PLUGIN_BASE_URL}
      INTERNAL_PLUGIN_BASE_URL: ${INTERNAL_PLUGIN_BASE_URL:-http://workbench:80}
      DEFAULT_PLUGIN_URLS: ${DEFAULT_PLUGIN_URLS:-http://service-metamodel:3000,http://service-model:3000,http://service-script:3000,http://service-model-transformation:3000,http://service-config:3000,http://service-config-optimization:3000,http://service-config-mdeo:3000}
    depends_on:
      postgres-backend:
        condition: service_healthy
      workbench:
        condition: service_started
    restart: unless-stopped

  workbench:
    build:
      context: ..
      dockerfile: infra/docker/workbench/Dockerfile
    environment:
      PLUGIN_METAMODEL_SERVICE: ${PLUGIN_METAMODEL_SERVICE:-http://service-metamodel:3000}
      PLUGIN_MODEL_SERVICE: ${PLUGIN_MODEL_SERVICE:-http://service-model:3000}
      PLUGIN_SCRIPT_SERVICE: ${PLUGIN_SCRIPT_SERVICE:-http://service-script:3000}
      PLUGIN_MODEL_TRANSFORMATION_SERVICE: ${PLUGIN_MODEL_TRANSFORMATION_SERVICE:-http://service-model-transformation:3000}
      PLUGIN_CONFIG_SERVICE: ${PLUGIN_CONFIG_SERVICE:-http://service-config:3000}
      PLUGIN_CONFIG_OPTIMIZATION_SERVICE: ${PLUGIN_CONFIG_OPTIMIZATION_SERVICE:-http://service-config-optimization:3000}
      PLUGIN_CONFIG_MDEO_SERVICE: ${PLUGIN_CONFIG_MDEO_SERVICE:-http://service-config-mdeo:3000}
      BACKEND_SERVICE: ${BACKEND_SERVICE:-http://backend:8080}
    ports:
      - "80:80"
    depends_on:
      service-metamodel:
        condition: service_healthy
      service-model:
        condition: service_healthy
      service-script:
        condition: service_healthy
      service-model-transformation:
        condition: service_healthy
      service-config:
        condition: service_healthy
      service-config-optimization:
        condition: service_healthy
      service-config-mdeo:
        condition: service_healthy
      optimizer-execution-0:
        condition: service_healthy
    restart: unless-stopped

  service-metamodel:
    build:
      context: ..
      dockerfile: infra/docker/service-metamodel/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-model:
    build:
      context: ..
      dockerfile: infra/docker/service-model/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-script:
    build:
      context: ..
      dockerfile: infra/docker/service-script/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      SCRIPT_EXECUTION_SERVICE_URL: ${SCRIPT_EXECUTION_SERVICE_URL:-http://script-execution:8080}
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-model-transformation:
    build:
      context: ..
      dockerfile: infra/docker/service-model-transformation/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MODEL_TRANSFORMATION_EXECUTION_SERVICE_URL: ${MODEL_TRANSFORMATION_EXECUTION_SERVICE_URL:-http://model-transformation-execution:8080}
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  script-execution:
    build:
      context: ..
      dockerfile: infra/docker/script-execution/Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: ${SCRIPT_EXECUTION_DATABASE_URL:-jdbc:postgresql://postgres-script:5432/mdeo}
      DATABASE_USER: ${SCRIPT_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${SCRIPT_DB_PASSWORD:-${DATABASE_PASSWORD}}
      BACKEND_API_URL: ${SCRIPT_EXECUTION_BACKEND_URL:-http://backend:8080}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-300000}
    depends_on:
      postgres-script:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  model-transformation-execution:
    build:
      context: ..
      dockerfile: infra/docker/model-transformation-execution/Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: ${TRANSFORMATION_EXECUTION_DATABASE_URL:-jdbc:postgresql://postgres-model-transformation:5432/mdeo}
      DATABASE_USER: ${MODEL_TRANSFORMATION_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${MODEL_TRANSFORMATION_DB_PASSWORD:-${DATABASE_PASSWORD}}
      BACKEND_API_URL: ${TRANSFORMATION_EXECUTION_BACKEND_URL:-http://backend:8080}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-300000}
    depends_on:
      postgres-model-transformation:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-config:
    build:
      context: ..
      dockerfile: infra/docker/service-config/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-config-optimization:
    build:
      context: ..
      dockerfile: infra/docker/service-config-optimization/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  service-config-mdeo:
    build:
      context: ..
      dockerfile: infra/docker/service-config-mdeo/Dockerfile
      args:
        SERVICE_VERSION: ${SERVICE_VERSION:-}
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      BACKEND_API_URL: "http://backend:8080"
      OPTIMIZER_EXECUTION_SERVICE_URL: ${OPTIMIZER_EXECUTION_SERVICE_URL:-http://optimizer-execution-0:8080}
      MAX_LANGIUM_INSTANCES: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  optimizer-execution-0:
    build:
      context: ..
      dockerfile: infra/docker/optimizer-execution/Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: ${OPTIMIZER_EXECUTION_DATABASE_URL:-jdbc:postgresql://postgres-optimizer:5432/mdeo}
      DATABASE_USER: ${OPTIMIZER_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${OPTIMIZER_DB_PASSWORD:-${DATABASE_PASSWORD}}
      BACKEND_API_URL: ${OPTIMIZER_EXECUTION_BACKEND_URL:-http://backend:8080}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-600000}
      NODE_ID: "0"
      PEERS: "http://optimizer-execution-0:8080,http://optimizer-execution-1:8080,http://optimizer-execution-2:8080"
      INCLUDE_SELF: "true"
      WORKER_THREADS: "1"
    depends_on:
      postgres-optimizer:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  optimizer-execution-1:
    build:
      context: ..
      dockerfile: infra/docker/optimizer-execution/Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: ${OPTIMIZER_EXECUTION_DATABASE_URL:-jdbc:postgresql://postgres-optimizer:5432/mdeo}
      DATABASE_USER: ${OPTIMIZER_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${OPTIMIZER_DB_PASSWORD:-${DATABASE_PASSWORD}}
      BACKEND_API_URL: ${OPTIMIZER_EXECUTION_BACKEND_URL:-http://backend:8080}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-600000}
      NODE_ID: "1"
      PEERS: "http://optimizer-execution-0:8080,http://optimizer-execution-1:8080,http://optimizer-execution-2:8080"
      INCLUDE_SELF: "true"
      WORKER_THREADS: "1"
    depends_on:
      postgres-optimizer:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  optimizer-execution-2:
    build:
      context: ..
      dockerfile: infra/docker/optimizer-execution/Dockerfile
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: ${OPTIMIZER_EXECUTION_DATABASE_URL:-jdbc:postgresql://postgres-optimizer:5432/mdeo}
      DATABASE_USER: ${OPTIMIZER_DB_USER:-${DATABASE_USER}}
      DATABASE_PASSWORD: ${OPTIMIZER_DB_PASSWORD:-${DATABASE_PASSWORD}}
      BACKEND_API_URL: ${OPTIMIZER_EXECUTION_BACKEND_URL:-http://backend:8080}
      EXECUTION_TIMEOUT_MS: ${EXECUTION_TIMEOUT_MS:-600000}
      NODE_ID: "2"
      PEERS: "http://optimizer-execution-0:8080,http://optimizer-execution-1:8080,http://optimizer-execution-2:8080"
      INCLUDE_SELF: "true"
      WORKER_THREADS: "1"
    depends_on:
      postgres-optimizer:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres-backend-data:
  postgres-script-data:
  postgres-model-transformation-data:
  postgres-optimizer-data:
